<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#162028" />
    <meta
      name="description"
      content="A browser-based voxel survival shooter prototype."
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>Voxel Game</title>
  </head>
  <body>
    <canvas id="game-canvas" aria-label="Voxel game scene"></canvas>
    <div id="touch-controls" class="touch-controls" aria-hidden="true">
      <div class="touch-stick touch-stick--move">
        <div id="move-stick-thumb" class="touch-stick__thumb"></div>
      </div>
      <div class="touch-stick touch-stick--aim">
        <div id="aim-stick-thumb" class="touch-stick__thumb"></div>
      </div>
    </div>
    <section id="hud" class="hud" aria-label="Game status">
      <div class="hud__stats">
        <span id="health-label">Health 100</span>
        <span id="wave-label">Wave -</span>
        <span id="enemies-label">Enemies 0</span>
      </div>
      <div class="hud__status">
        <strong id="status-label">Ready</strong>
        <span id="summary-label">Kills 0 | Pickups 0</span>
      </div>
      <div class="hud__actions">
        <button id="primary-action" type="button">Start</button>
        <button id="pause-action" type="button" disabled>Pause</button>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

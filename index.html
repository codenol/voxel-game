<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#162028" />
    <meta
      name="description"
      content="A browser-based voxel survival shooter prototype."
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>Voxel Game</title>
  </head>
  <body>
    <canvas id="game-canvas" aria-label="Voxel game scene"></canvas>
    <div id="touch-controls" class="touch-controls" aria-hidden="true">
      <div class="touch-stick touch-stick--move">
        <div id="move-stick-thumb" class="touch-stick__thumb"></div>
      </div>
      <div class="touch-stick touch-stick--aim">
        <div id="aim-stick-thumb" class="touch-stick__thumb"></div>
      </div>
    </div>
    <section id="hud" class="hud" aria-label="Game status">
      <div class="hud__stats">
        <span id="health-label">Health 100/100</span>
        <span id="weapon-label">Pulse Carbine</span>
        <span id="ammo-label">Ammo ∞</span>
        <span id="wave-label">Wave -</span>
        <span id="countdown-label">Next --</span>
        <span id="enemies-label">Enemies 0/0</span>
        <span id="score-label">Score 0</span>
        <span id="kills-label">Kills 0</span>
      </div>
      <div class="hud__status">
        <strong id="status-label">Ready</strong>
        <span id="summary-label">Press Start to begin</span>
      </div>
      <div class="hud__actions">
        <button id="primary-action" type="button">Start</button>
        <button id="pause-action" type="button" disabled>Pause</button>
      </div>
    </section>
    <section id="menu-panel" class="menu-panel" aria-live="polite">
      <div class="menu-panel__box">
        <p id="menu-kicker" class="menu-panel__kicker">Voxel Survival</p>
        <h1 id="menu-title">Ready</h1>
        <p id="menu-copy">Clear waves, collect drops, and stay alive.</p>
        <dl id="run-stats" class="run-stats" hidden></dl>
        <div class="menu-panel__actions">
          <button id="menu-primary-action" type="button">Start Run</button>
          <button id="menu-secondary-action" type="button" hidden>Resume</button>
        </div>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
